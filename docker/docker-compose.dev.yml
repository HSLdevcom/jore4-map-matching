---
version: "3.8"
services:
  # pgRouting database
  jore4-mapmatchingdevdb:
    image: pgrouting/pgrouting:13-3.1-3.2.0
    container_name: mapmatchingdevdb
    restart: "unless-stopped"
    networks:
      - jore4
    ports:
      - "127.0.0.1:18000:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  # pgRouting database, for tests and jOOQ generation
  jore4-mapmatchingtestdb:
    image: pgrouting/pgrouting:13-3.1-3.2.0
    container_name: mapmatchingtestdb
    restart: "unless-stopped"
    networks:
      - jore4
    ports:
      - "127.0.0.1:20000:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  jore4-mapmatching:
    build:
      context: ".."
      target: development
    container_name: mapmatching
    restart: "unless-stopped"
    networks:
      - jore4
    ports:
      - "127.0.0.1:3200:8080"
    environment:
      - DEV_DB_HOST=jore4-mapmatchingdevdb
      - DEV_DB_PORT=5432
      - TEST_DB_HOST=jore4-mapmatchingtestdb
      - TEST_DB_PORT=5432

networks:
  jore4:
