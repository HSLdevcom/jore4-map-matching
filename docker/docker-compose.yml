---
version: "3.8"
services:
  # pgRouting database populated with infrastructure network data
  jore4-mapmatchingdb:
    image: hsldevcom/jore4-postgres:mapmatching-main--df61098c81ba5419cea763136644fa84ba31a870
    container_name: mapmatchingdb
    restart: "unless-stopped"
    networks:
      - jore4
    ports:
      - "127.0.0.1:19000:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DIGIROAD_ROUTING_DUMP_VERSION=2021-11-04

  jore4-mapmatching:
    build:
      context: ".."
      target: production
    container_name: mapmatching
    restart: "unless-stopped"
    networks:
      - jore4
    ports:
      - "127.0.0.1:3200:8080"
    environment:
      - DB_DATABASE=${POSTGRES_DB}
      - DB_HOSTNAME=jore4-mapmatchingdb
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}

networks:
  jore4:
